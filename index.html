<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Builder</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --primary:#2563eb; --primary-soft:#dbeafe; --green:#15803d; --green-soft:#dcfce7;
      --red:#b91c1c; --red-soft:#fee2e2; --amber:#92400e; --amber-soft:#fef3c7;
      --shadow:0 8px 24px rgba(17,24,39,.08); --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .wrap{max-width:980px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
    h1,h2,h3{margin:0 0 10px 0;line-height:1.25}
    h1{font-size:30px} h2{font-size:22px} h3{font-size:18px}
    p{margin:8px 0}.muted{color:var(--muted)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media (max-width:700px){.row{grid-template-columns:1fr}}
    label{display:block;font-weight:600;margin-bottom:6px}
    input[type="text"], textarea, input[type="file"]{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font:inherit;background:#fff}
    textarea{min-height:320px;resize:vertical}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    button,.buttonlink{border:none;background:var(--primary);color:#fff;border-radius:14px;padding:11px 16px;font:inherit;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
    button.secondary,.buttonlink.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    button.ghost,.buttonlink.ghost{background:#eef2ff;color:#1e3a8a}
    button:disabled{opacity:.55;cursor:not-allowed}
    .pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:700;margin-right:8px}
    .alert{border-radius:14px;padding:12px 14px;border:1px solid var(--line);background:#fff}
    .alert.error{background:var(--red-soft);color:#7f1d1d;border-color:#fecaca}
    .alert.info{background:var(--primary-soft);color:#1e3a8a;border-color:#bfdbfe}
    .alert.ok{background:var(--green-soft);color:#14532d;border-color:#bbf7d0}
    .switches{display:grid;gap:12px}
    .switchrow{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
    .question{margin-bottom:16px}
    .option{border:1px solid var(--line);border-radius:16px;padding:12px 14px;margin-top:10px;background:#fff;transition:.15s ease}
    .option:hover{border-color:#c7d2fe}
    .option.selected{border-color:#93c5fd;background:#f8fbff}
    .option.correct{border-color:#86efac;background:#f0fdf4}
    .option.wrong{border-color:#fca5a5;background:#fef2f2}
    .feedback{margin-top:12px;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fafafa}
    .feedback.correct{background:var(--green-soft);border-color:#bbf7d0}
    .feedback.incorrect{background:var(--amber-soft);border-color:#fde68a}
    .small{font-size:14px}
    code.inline{background:#eef2ff;padding:2px 6px;border-radius:8px}
    .topbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap}
  </style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const SAMPLE_TSV = `No\tQuestion\tOption A\tOption B\tOption C\tOption D\tCorrect Answer\tExplanation\tSupporting Excerpt
1\tWhich statement about an ideal renal biomarker is appropriate?\tIt should show wide biologic variability and partial protein binding.\tIt should be easy to measure and cost-effective.\tIt should undergo substantial non-renal metabolism.\tIt should be secreted and reabsorbed by the tubules.\tB\tThe chapter lists easy measurability and cost-effectiveness among the ideal properties of a renal biomarker.\tThe ideal properties of a renal biomarker include ... easy measurability, and cost-effectiveness.
2\tWhich description of creatinine is correct?\tIts production rate varies markedly from day to day and is independent of muscle mass.\tIt is synthesized mainly in the liver from ammonia.\tIt is a breakdown product of creatine and creatine phosphate in skeletal muscle.\tIt is reabsorbed extensively by the proximal tubule in dogs and cats.\tC\tCreatinine is described as a breakdown product of creatine and creatine phosphate in skeletal muscle.\tCreatinine is a breakdown product of creatine and creatine phosphate in skeletal muscle.`;

function escapeHtml(s=''){ return s.replace(/[&<>\"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[ch])); }
function norm(s=''){ return s.toLowerCase().replace(/[\s_\-・（）()]/g,'').replace(/：/g,'').trim(); }
function shuffleArray(arr){ const a = arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function bytesToBase64Url(bytes){
  let binary = '';
  const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    binary += String.fromCharCode(...bytes.subarray(i, i+chunk));
  }
  return btoa(binary).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function base64UrlToBytes(base64url){
  const padded = base64url.replace(/-/g,'+').replace(/_/g,'/') + '==='.slice((base64url.length + 3) % 4);
  const binary = atob(padded);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}
async function compressString(str){
  if (!('CompressionStream' in window)) {
    throw new Error('このブラウザでは圧縮共有が使えません。');
  }
  const cs = new CompressionStream('gzip');
  const writer = cs.writable.getWriter();
  writer.write(new TextEncoder().encode(str));
  writer.close();
  const compressed = await new Response(cs.readable).arrayBuffer();
  return bytesToBase64Url(new Uint8Array(compressed));
}
async function decompressString(base64url){
  if (!('DecompressionStream' in window)) {
    throw new Error('このブラウザでは圧縮共有が使えません。');
  }
  const bytes = base64UrlToBytes(base64url);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  const decompressed = await new Response(ds.readable).arrayBuffer();
  return new TextDecoder().decode(decompressed);
}

function parseTSV(tsv){
  const lines = tsv.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n").filter(x=>x.trim());
  if(lines.length<2) throw new Error("TSVの行数が足りません。ヘッダー行と少なくとも1問分のデータが必要です。");
  const headers = lines[0].split("\t").map(x=>x.trim());
  const h = headers.map(norm);
  const idx = (...cands)=>{ for(const c of cands){ const i=h.indexOf(norm(c)); if(i>=0) return i; } return -1; };
  const map = {
    no: idx("No","番号","questionno"),
    q: idx("Question","問題","Question title","Questiontitle"),
    a: idx("Option A","A","選択肢A"),
    b: idx("Option B","B","選択肢B"),
    c: idx("Option C","C","選択肢C"),
    d: idx("Option D","D","選択肢D"),
    correct: idx("Correct Answer","Correct","Answer","正答","正解","解答"),
    explanation: idx("Explanation","解説","Feedback","Answer feedback"),
    excerpt: idx("Supporting Excerpt","Excerpt","根拠","根拠本文抜粋","本文抜粋"),
  };
  const required = ["q","a","b","c","d","correct"].filter(k=>map[k]===-1);
  if(required.length) throw new Error("必要な列が見つかりません: " + required.join(", "));
  return lines.slice(1).map((line,i)=>{
    const cells = line.split("\t");
    const correct = ((cells[map.correct]||"").trim().toUpperCase());
    if(!["A","B","C","D"].includes(correct)) throw new Error((i+2)+"行目の正答がA/B/C/Dになっていません。");
    return {
      id: (cells[map.no]||String(i+1)).trim(),
      question: (cells[map.q]||"").trim(),
      options: { A:(cells[map.a]||"").trim(), B:(cells[map.b]||"").trim(), C:(cells[map.c]||"").trim(), D:(cells[map.d]||"").trim() },
      correct,
      explanation: map.explanation>=0 ? (cells[map.explanation]||"").trim() : "",
      excerpt: map.excerpt>=0 ? (cells[map.excerpt]||"").trim() : "",
    };
  }).filter(r => r.question && r.options.A && r.options.B && r.options.C && r.options.D);
}

function buildQuestions(questions, shuffleQ, shuffleC){
  let qs = questions.map(q=>{
    let entries = Object.entries(q.options).map(([k,v])=>({orig:k, text:v}));
    if(shuffleC) entries = shuffleArray(entries);
    const displayOptions = {}, map = {};
    ["A","B","C","D"].forEach((key, idx)=>{ displayOptions[key]=entries[idx].text; map[key]=entries[idx].orig; });
    const displayCorrect = Object.keys(map).find(k => map[k]===q.correct) || q.correct;
    return {...q, displayOptions, displayCorrect};
  });
  if(shuffleQ) qs = shuffleArray(qs);
  return qs;
}

async function getHashQuiz(){
  const hash = location.hash.replace(/^#/,'');
  if(hash.startsWith('quizz=')){
    try{
      const json = await decompressString(hash.slice(6));
      return JSON.parse(json);
    }catch(e){
      console.error(e);
      return {__error:"共有リンクの展開に失敗しました。リンクが壊れているか、ブラウザが圧縮共有に未対応です。"};
    }
  }
  if(hash.startsWith('quiz=')){
    try{
      const padded = hash.slice(5);
      const json = decodeURIComponent(escape(atob(padded)));
      return JSON.parse(json);
    }catch(e){
      return {__error:"旧形式リンクの読み込みに失敗しました。"};
    }
  }
  return null;
}

const state = {
  title:'Chapter Quiz', description:'Paste TSV to generate an answer page.',
  tsv:'', questions:[], rendered:[], answers:{}, shareLink:'', error:'',
  shuffleQuestions:false, shuffleChoices:false, mode:'builder', status:''
};

function saveLocal(){
  if(state.mode==='solver') return;
  localStorage.setItem('quiz_builder_single_file_v3', JSON.stringify({
    title:state.title, description:state.description, tsv:state.tsv, questions:state.questions,
    shuffleQuestions:state.shuffleQuestions, shuffleChoices:state.shuffleChoices
  }));
}
function loadLocal(){
  const raw = localStorage.getItem('quiz_builder_single_file_v3');
  if(!raw) return;
  try{
    const s = JSON.parse(raw);
    state.title = s.title || state.title;
    state.description = s.description || state.description;
    state.tsv = s.tsv || '';
    state.questions = Array.isArray(s.questions) ? s.questions : [];
    state.shuffleQuestions = !!s.shuffleQuestions;
    state.shuffleChoices = !!s.shuffleChoices;
  }catch(e){}
}
function resetRendered(){ state.rendered = buildQuestions(state.questions, state.shuffleQuestions, state.shuffleChoices); state.answers = {}; }
async function makeShareLink(){
  const payload = {
    title:state.title, description:state.description, questions:state.questions,
    shuffleQuestions:state.shuffleQuestions, shuffleChoices:state.shuffleChoices
  };
  const compressed = await compressString(JSON.stringify(payload));
  state.shareLink = location.origin + location.pathname + '#quizz=' + compressed;
}
function downloadQuizFile(){
  const payload = {
    title:state.title, description:state.description, questions:state.questions,
    shuffleQuestions:state.shuffleQuestions, shuffleChoices:state.shuffleChoices
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.title || 'quiz').replace(/[^\w\-]+/g,'_') + '.quiz.json';
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  a.remove();
}
async function loadQuizFile(file){
  const text = await file.text();
  const payload = JSON.parse(text);
  if(!payload.questions || !Array.isArray(payload.questions)) throw new Error('クイズファイルの形式を認識できませんでした。');
  state.title = payload.title || state.title;
  state.description = payload.description || state.description;
  state.questions = payload.questions;
  state.shuffleQuestions = !!payload.shuffleQuestions;
  state.shuffleChoices = !!payload.shuffleChoices;
  saveLocal();
  resetRendered();
}

function render(){
  const app = document.getElementById('app');
  if(state.mode==='solver'){
    const answeredCount = Object.keys(state.answers).length;
    const score = state.rendered.reduce((n,q)=> n + ((state.answers[q.id]||'')===q.displayCorrect ? 1 : 0), 0);
    app.innerHTML = `
      <div class="card">
        <div class="topbar">
          <div><h1>${escapeHtml(state.title)}</h1><p class="muted">${escapeHtml(state.description)}</p></div>
          <div><span class="pill">${state.rendered.length} questions</span><span class="pill">${score} correct</span></div>
        </div>
        <div class="btns">
          <button class="secondary" id="resetAnswersBtn">Reset answers</button>
          <button class="secondary" id="reshuffleBtn">Reshuffle</button>
          <a class="buttonlink ghost" href="${escapeHtml(location.origin + location.pathname)}">Open builder page</a>
        </div>
        <div class="alert info" style="margin-top:12px;">選択肢を選ぶと、その問題のすぐ下に解答・解説が表示されます。現在の回答数: ${answeredCount}</div>
      </div>
      ${state.rendered.map((q, idx)=>{
        const selected = state.answers[q.id] || '';
        const hasAnswered = !!selected;
        const isCorrect = selected === q.displayCorrect;
        return `
          <div class="card question">
            <h3>Q${idx+1}. ${escapeHtml(q.question)}</h3>
            ${Object.entries(q.displayOptions).map(([key, text])=>{
              let cls='option';
              if(selected===key) cls+=' selected';
              if(hasAnswered && q.displayCorrect===key) cls+=' correct';
              if(hasAnswered && selected===key && q.displayCorrect!==key) cls+=' wrong';
              return `<label class="${cls}"><input type="radio" name="q_${escapeHtml(q.id)}" value="${key}" ${selected===key?'checked':''}> <strong>${key}.</strong> ${escapeHtml(text)}</label>`;
            }).join('')}
            ${hasAnswered ? `<div class="feedback ${isCorrect ? 'correct':'incorrect'}">
              <div><strong>${isCorrect ? 'Correct' : 'Incorrect'}</strong>${isCorrect ? '' : ` · Correct answer: ${escapeHtml(q.displayCorrect)}`}</div>
              ${q.explanation ? `<div style="margin-top:8px;"><strong>Explanation</strong><div class="small">${escapeHtml(q.explanation)}</div></div>` : ''}
              ${q.excerpt ? `<div style="margin-top:8px;"><strong>Supporting excerpt</strong><div class="small">${escapeHtml(q.excerpt)}</div></div>` : ''}
            </div>` : ''}
          </div>`;
      }).join('')}
    `;
    document.getElementById('resetAnswersBtn').onclick = ()=>{ state.answers={}; render(); };
    document.getElementById('reshuffleBtn').onclick = ()=>{ resetRendered(); render(); };
    state.rendered.forEach(q=>{
      document.querySelectorAll(`input[name="q_${CSS.escape(q.id)}"]`).forEach(el=>{
        el.addEventListener('change', e=>{ state.answers[q.id]=e.target.value; render(); });
      });
    });
    return;
  }

  app.innerHTML = `
    <div class="card">
      <div class="topbar">
        <div><h1>Quiz Builder</h1><p class="muted">TSVを貼ってクイズを作成し、回答専用ページのリンクかクイズファイルを作ります。</p></div>
        <div><span class="pill">Builder page</span></div>
      </div>
    </div>
    <div class="card">
      <h2>1. Quiz data</h2>
      <p class="muted">列は <code class="inline">No</code> / <code class="inline">Question</code> / <code class="inline">Option A-D</code> / <code class="inline">Correct Answer</code> が必須です。</p>
      <div class="row">
        <div><label for="title">Quiz title</label><input id="title" type="text" value="${escapeHtml(state.title)}"></div>
        <div><label for="description">Description</label><input id="description" type="text" value="${escapeHtml(state.description)}"></div>
      </div>
      <div style="margin-top:14px;"><label for="tsv">TSV</label><textarea id="tsv">${escapeHtml(state.tsv)}</textarea></div>
      <div class="btns">
        <button id="generateBtn">Generate quiz data</button>
        <button class="secondary" id="sampleBtn">Load sample TSV</button>
      </div>
      ${state.error ? `<div class="alert error" style="margin-top:12px;">${escapeHtml(state.error)}</div>` : ''}
      ${state.status ? `<div class="alert ok" style="margin-top:12px;">${escapeHtml(state.status)}</div>` : ''}
    </div>
    <div class="card">
      <h2>2. Answer page sharing</h2>
      <p class="muted">共有リンクは gzip 圧縮して以前より短くしています。さらに扱いやすさ重視なら、下のクイズファイル共有が便利です。</p>
      <div class="switches">
        <label class="switchrow"><span><strong>Shuffle question order</strong><br><span class="muted small">回答ページ表示時の問題順をランダム化します。</span></span><input id="shuffleQ" type="checkbox" ${state.shuffleQuestions ? 'checked' : ''}></label>
        <label class="switchrow"><span><strong>Shuffle choice order</strong><br><span class="muted small">選択肢順をランダム化し、正答も追従させます。</span></span><input id="shuffleC" type="checkbox" ${state.shuffleChoices ? 'checked' : ''}></label>
      </div>
      <div class="btns">
        <button class="secondary" id="createLinkBtn" ${state.questions.length ? '' : 'disabled'}>Create compressed answer-page link</button>
        <button class="secondary" id="downloadQuizBtn" ${state.questions.length ? '' : 'disabled'}>Download quiz file</button>
      </div>
      ${state.shareLink ? `<div style="margin-top:12px;">
        <label for="shareLink">Compressed answer-page link</label>
        <textarea id="shareLink" readonly style="min-height:120px;">${escapeHtml(state.shareLink)}</textarea>
        <div class="btns">
          <button id="copyLinkBtn">Copy link</button>
          <a class="buttonlink ghost" href="${escapeHtml(state.shareLink)}" target="_blank" rel="noreferrer">Open answer page</a>
        </div>
      </div>` : ''}
      <div style="margin-top:14px;">
        <label for="quizFile">Load shared quiz file</label>
        <input id="quizFile" type="file" accept=".json,.quiz.json,application/json">
      </div>
      <div class="alert ok" style="margin-top:12px;">回答ページでは、各問で選択肢を選んだ瞬間に、その問題の直下へ正誤・解説・根拠抜粋が表示されます。</div>
    </div>
  `;

  document.getElementById('title').addEventListener('input', e=>{ state.title=e.target.value; saveLocal(); });
  document.getElementById('description').addEventListener('input', e=>{ state.description=e.target.value; saveLocal(); });
  document.getElementById('tsv').addEventListener('input', e=>{ state.tsv=e.target.value; saveLocal(); });
  document.getElementById('shuffleQ').addEventListener('change', e=>{ state.shuffleQuestions=e.target.checked; saveLocal(); });
  document.getElementById('shuffleC').addEventListener('change', e=>{ state.shuffleChoices=e.target.checked; saveLocal(); });
  document.getElementById('sampleBtn').onclick = ()=>{ state.tsv=SAMPLE_TSV; state.error=''; state.status=''; saveLocal(); render(); };
  document.getElementById('generateBtn').onclick = ()=>{
    try{
      state.questions = parseTSV(document.getElementById('tsv').value);
      state.error=''; state.shareLink=''; state.status='クイズデータを読み込みました。';
      saveLocal(); render();
    }catch(e){ state.error=e.message || 'TSVの解析に失敗しました。'; state.status=''; render(); }
  };
  const linkBtn = document.getElementById('createLinkBtn');
  if(linkBtn){ linkBtn.onclick = async ()=>{
    try{
      state.status='リンクを圧縮中です...';
      render();
      await makeShareLink();
      state.status='圧縮リンクを作成しました。';
      render();
    }catch(e){
      state.status='';
      state.error = e.message || '圧縮リンクの作成に失敗しました。';
      render();
    }
  }; }
  const dlBtn = document.getElementById('downloadQuizBtn');
  if(dlBtn){ dlBtn.onclick = ()=>{ downloadQuizFile(); }; }
  const copyBtn = document.getElementById('copyLinkBtn');
  if(copyBtn){ copyBtn.onclick = async ()=>{ try{ await navigator.clipboard.writeText(state.shareLink); copyBtn.textContent='Copied'; setTimeout(()=>copyBtn.textContent='Copy link',1400); }catch(e){} }; }
  const fileInput = document.getElementById('quizFile');
  if(fileInput){
    fileInput.addEventListener('change', async (e)=>{
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      try{
        await loadQuizFile(file);
        state.error='';
        state.status='クイズファイルを読み込みました。';
        render();
      }catch(err){
        state.status='';
        state.error = err.message || 'クイズファイルの読み込みに失敗しました。';
        render();
      }
    });
  }
}

(async function init(){
  const hashQuiz = await getHashQuiz();
  if(hashQuiz && hashQuiz.__error){
    state.error = hashQuiz.__error;
    state.mode = 'builder';
    loadLocal();
    if(state.questions.length) resetRendered();
    render();
    return;
  }
  if(hashQuiz && hashQuiz.questions){
    state.mode='solver';
    state.title = hashQuiz.title || state.title;
    state.description = hashQuiz.description || state.description;
    state.questions = Array.isArray(hashQuiz.questions) ? hashQuiz.questions : [];
    state.shuffleQuestions = !!hashQuiz.shuffleQuestions;
    state.shuffleChoices = !!hashQuiz.shuffleChoices;
    resetRendered();
  }else{
    loadLocal();
    if(state.questions.length) resetRendered();
  }
  render();
})();
</script>
</body>
</html>
